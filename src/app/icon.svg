<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" fill="#0F1724" rx="22"/>

  <!-- Top block — blue, offset right -->
  <rect x="32" y="26" width="42" height="14" rx="4" fill="#3B6FE8"/>

  <!-- Middle block — white, full width -->
  <rect x="20" y="44" width="60" height="14" rx="4" fill="#ffffff"/>

  <!-- Bottom block — blue, offset left, shorter -->
  <rect x="20" y="62" width="36" height="14" rx="4" fill="#3B6FE8"/>

  <!-- Vertical connector — white, left edge -->
  <rect x="20" y="26" width="4" height="50" rx="2" fill="#ffffff" opacity="0.25"/>
</svg>
